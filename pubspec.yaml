publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  pdf: ^3.11.4
  printing: ^5.14.2
  fl_chart: ^0.70.2
  connectivity_plus: ^6.1.4
  uuid: ^4.5.1
  animations: ^2.0.12
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  flutter_slidable: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

